<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Sign Up</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/userLogin.css">
</head>
<body>

    <section class="hero">

        <!-- Brand / Logo -->
        <div class="brand">
            <div class="brand-icon">
                <span>HCS</span>
            </div>
            <div class="brand-text">
                <h1>Home Care Service</h1>
                <p>Quality Care, Quality Life</p>
            </div>
        </div>

        <!-- Form Container -->
        <a href="../index.html" class="btn btn-secondary back-link" aria-label="Return">←</a>
        <div class="form-container">
            <!-- Form Tabs -->
            <div class="form-tabs" id="formTabs">
                <button class="tab-btn active" data-form="login">Log In</button>
                <button class="tab-btn" data-form="signup">Sign Up</button>
                <div class="tab-slider"></div>
            </div>

            <!-- Login Form -->
            <form class="form active" id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="loginEmail">Email Address</label>
                    <input type="email" id="loginEmail" class="form-input" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" class="form-input" placeholder="Enter your password" required>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Log In</button>
                    <a href="#" class="btn btn-secondary">Forgot Password?</a>
                </div>
            </form>

            <!-- Sign Up Form -->
            <form class="form" id="signupForm">
                <!-- name fields arranged in two rows -->
                <div class="name-row">
                    <div class="form-group">
                        <label class="form-label" for="signupSurname">Surname</label>
                        <input type="text" id="signupSurname" class="form-input" placeholder="Surname" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="signupFirstName">First Name</label>
                        <input type="text" id="signupFirstName" class="form-input" placeholder="First Name" required>
                    </div>
                </div>
                <div class="name-row">
                    <div class="form-group">
                        <label class="form-label" for="signupMiddleName">Middle Name</label>
                        <input type="text" id="signupMiddleName" class="form-input" placeholder="Middle Name" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="signupSuffix">Suffix</label>
                        <input type="text" id="signupSuffix" class="form-input" placeholder="Suffix (Optional)" required>
                    </div>
                </div>
                <div class="form-group">
                    <br>
                    <label class="form-label" for="signupEmail">Email Address</label>
                    <input type="email" id="signupEmail" class="form-input" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="signupPassword">Password</label>
                    <input type="password" id="signupPassword" class="form-input" placeholder="Create a password" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="signupConfirmPassword">Confirm Password</label>
                    <input type="password" id="signupConfirmPassword" class="form-input" placeholder="Confirm your password" required>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Sign Up</button>
                </div>
            </form>
        </div>

    </section>

    <footer>
        <p>© 2026 Home Care Service (HCS). All Rights Reserved.</p>
    </footer>

    <script src="../js/userLogin.js"></script>

</body>
</html>
