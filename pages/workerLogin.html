<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HCS – Worker Portal</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../styles/workerstyle.css">
</head>

<body>

<section class="hero">

<a href="../index.html" class="btn btn-secondary back-link">←</a>

<!-- LOGO -->
<div class="brand">

<div class="brand-icon">
<span>HCS</span>
</div>

<div class="brand-text">
<h1>Home Care Service</h1>
<p>Quality Care, Quality Life</p>
</div>

</div>

<!-- FORM CONTAINER -->
<div class="form-container">

<div class="form-tabs">
<button class="tab-btn active">Log In</button>
<div class="tab-slider"></div>
</div>

<!-- LOGIN FORM -->
<form class="form active" id="loginForm">

<div class="form-group">
<label class="form-label" for="loginEmail">Email address</label>

<input
type="email"
id="loginEmail"
class="form-input"
placeholder="Enter your Email"
required
>
</div>

<div class="form-group">
<label class="form-label" for="loginPassword">Password</label>

<input
type="password"
id="loginPassword"
class="form-input"
placeholder="Enter your password"
required
>
</div>

<div class="form-actions">

<button type="submit" class="btn btn-primary">
Log In
</button>

<a href="#" class="btn btn-secondary">
Forgot password?
</a>

</div>

</form>

</div>

</section>

<script src="../js/userLogin.js"></script>

</body>
</html>
